<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amna Study Hub</title>

<style>

body{

font-family:Arial,sans-serif;

background:#e9ddf5;

text-align:center;

padding:20px;

}

.card{

background:white;

max-width:700px;

margin:auto;

padding:20px;

border-radius:20px;

box-shadow:0 0 10px rgba(0,0,0,0.1);

}

button{

display:block;

width:100%;

padding:12px;

margin:10px 0;

border:none;

border-radius:10px;

font-size:16px;

cursor:pointer;

}

button:hover{

opacity:0.9;

}

#nextBtn{

background:#8e44ad;

color:white;

}

h1{

color:#8e44ad;

}

</style>

</head>

<body>

<div class="card">

<h1>🌸 Amna Study Hub 🌸</h1>

<h2 id="question"></h2>

<div id="answers"></div>

<button id="nextBtn" onclick="nextQuestion()">Soalan Seterusnya</button>

<p id="score"></p>

</div>

<script>

const questions = [

{

question:"Apakah hasil 7 × 8 ?",

answers:["54","56","64","48"],

correct:1

},

{

question:"Planet yang kita duduki ialah?",

answers:["Marikh","Bumi","Musytari","Zuhrah"],

correct:1

},

{

question:"Siapakah Perdana Menteri pertama Malaysia?",

answers:["Tun Mahathir","Tunku Abdul Rahman","Tun Razak","Tun Hussein Onn"],

correct:1

},

{

question:"Apakah ibu negara Malaysia?",

answers:["Johor Bahru","Ipoh","Kuala Lumpur","Melaka"],

correct:2

},

{

question:"Air membeku pada suhu berapa?",

answers:["0°C","50°C","100°C","10°C"],

correct:0

}

];

let currentQuestion=0;

let score=0;

function showQuestion(){

let q=questions[currentQuestion];

document.getElementById("question").innerText=q.question;

let answersDiv=document.getElementById("answers");

answersDiv.innerHTML="";

q.answers.forEach((answer,index)=>{

let btn=document.createElement("button");

btn.innerText=answer;

btn.onclick=function(){

if(index===q.correct){

score++;

alert("Betul!");

}else{

alert("Salah!");

}

};

answersDiv.appendChild(btn);

});

}

function nextQuestion(){

currentQuestion++;

if(currentQuestion<questions.length){

showQuestion();

}else{

document.querySelector(".card").innerHTML=

"<h1>Tahniah Amna 🎉</h1><p>Skor: "+score+"/"+questions.length+"</p>";

}

}

showQuestion();

</script>

</body>

</html>
