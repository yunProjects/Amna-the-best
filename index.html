<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amna Study Hub</title>

<style>

body{

    font-family:Arial,sans-serif;

    background:#e9ddf5;

    text-align:center;

    padding:20px;

}

.card{

    background:white;

    max-width:700px;

    margin:auto;

    padding:20px;

    border-radius:20px;

    box-shadow:0 4px 10px rgba(0,0,0,0.1);

}

h1{

    color:#7b3fc5;

}

button{

    background:#7b3fc5;

    color:white;

    border:none;

    padding:10px 20px;

    margin:5px;

    border-radius:10px;

    cursor:pointer;

}

button:hover{

    opacity:0.9;

}

#result{

    font-size:20px;

    font-weight:bold;

    margin-top:15px;

}

</style>

</head>

<body>

<div class="card">

<h1>🌸 Amna Study Hub 🌸</h1>

<p><b>Kata-kata Semangat:</b></p>

<p>

"Amna, setiap hari adalah peluang baru untuk menjadi lebih hebat.

Jangan takut membuat kesilapan kerana itulah cara kita belajar."

</p>

<hr>

<h2>Kuiz Tingkatan 1</h2>

<p id="question"></p>

<div id="answers"></div>

<p id="result"></p>

<button onclick="nextQuestion()">Soalan Seterusnya</button>

</div>

<script>

const quiz = [

{

q:"Apakah ibu negara Malaysia?",

a:["Johor Bahru","Kuala Lumpur","Ipoh","Kuching"],

c:1

},

{

q:"Berapakah 7 × 8?",

a:["54","56","64","72"],

c:1

},

{

q:"Planet yang paling hampir dengan Matahari ialah?",

a:["Bumi","Marikh","Utarid","Musytari"],

c:2

},

{

q:"Apakah simbol kimia bagi air?",

a:["CO2","H2O","NaCl","O2"],

c:1

},

{

q:"Siapakah Bapa Kemerdekaan Malaysia?",

a:["Tun Razak","Tun Hussein Onn","Tunku Abdul Rahman","Tun Mahathir"],

c:2

},

{

q:"Kata nama khas mesti ditulis dengan?",

a:["Huruf kecil","Huruf besar","Warna merah","Italic"],

c:1

},

{

q:"Negeri terbesar di Malaysia ialah?",

a:["Sabah","Sarawak","Johor","Pahang"],

c:1

},

{

q:"Berapakah hasil 100 ÷ 4?",

a:["20","24","25","30"],

c:2

},

{

q:"Apakah bahasa rasmi Malaysia?",

a:["Inggeris","Mandarin","Bahasa Melayu","Tamil"],

c:2

},

{

q:"Gunung tertinggi di Malaysia ialah?",

a:["Gunung Tahan","Gunung Kinabalu","Gunung Ledang","Gunung Jerai"],

c:1

}

];

let current=0;

let score=0;

function loadQuestion(){

document.getElementById("result").innerHTML="";

const q=quiz[current];

document.getElementById("question").innerHTML=

(current+1)+". "+q.q;

let html="";

q.a.forEach((ans,index)=>{

html+=`

<button onclick="checkAnswer(${index})">

${ans}

</button><br><br>

`;

});

document.getElementById("answers").innerHTML=html;

}

function checkAnswer(choice){

if(choice===quiz[current].c){

score++;

document.getElementById("result").innerHTML="✅ Betul!";

}else{

document.getElementById("result").innerHTML="❌ Salah";

}

}

function nextQuestion(){

current++;

if(current>=quiz.length){

document.getElementById("question").innerHTML=

"🎉 Kuiz Tamat!";

document.getElementById("answers").innerHTML=

"Markah Amna: "+score+" / "+quiz.length;

document.getElementById("result").innerHTML=

"Hebat! Teruskan belajar 💜";

return;

}

loadQuestion();

}

loadQuestion();

</script>

</body>

</html>
