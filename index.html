<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amna The Best</title>

<style>

body{

font-family:Arial,sans-serif;

background:#e9ddf5;

text-align:center;

padding:20px;

}

.card{

background:white;

max-width:700px;

margin:auto;

padding:20px;

border-radius:20px;

box-shadow:0 0 15px rgba(0,0,0,0.1);

}

h1{

color:#8e44ad;

}

.quote{

font-size:18px;

margin:20px 0;

color:#555;

}

button{

background:#8e44ad;

color:white;

border:none;

padding:12px 20px;

border-radius:10px;

font-size:16px;

cursor:pointer;

}

button:hover{

background:#6c3483;

}

#quiz{

margin-top:20px;

font-size:20px;

}

.answer{

display:block;

margin:10px auto;

width:80%;

}

</style>

</head>

<body>

<div class="card">

<h1>🌸 Amna The Best 🌸</h1>

<p class="quote">

"Amna, jangan takut untuk gagal. Setiap usaha yang Amna buat hari ini akan menjadikan Amna lebih hebat esok."

</p>

<h2>📚 Kuiz Tingkatan 1</h2>

<div id="quiz"></div>

<button onclick="nextQuestion()">Soalan Seterusnya</button>

</div>

<script>

const questions = [

{

q:"Apakah ibu negara Malaysia?",

a:["Johor Bahru","Kuala Lumpur","Ipoh","Kuching"],

c:1

},

{

q:"Berapakah hasil 15 × 4?",

a:["60","50","45","55"],

c:0

},

{

q:"Planet yang paling hampir dengan Matahari ialah?",

a:["Bumi","Marikh","Utarid","Musytari"],

c:2

},

{

q:"Apakah bahasa kebangsaan Malaysia?",

a:["Inggeris","Mandarin","Tamil","Bahasa Melayu"],

c:3

},

{

q:"Siapakah Bapa Kemerdekaan Malaysia?",

a:["Tun Razak","Tunku Abdul Rahman","Tun Hussein Onn","Tun Mahathir"],

c:1

},

{

q:"Apakah simbol kimia bagi air?",

a:["CO2","H2O","O2","NaCl"],

c:1

},

{

q:"Berapa jumlah sudut segitiga?",

a:["90°","180°","270°","360°"],

c:1

},

{

q:"Negeri terbesar di Malaysia ialah?",

a:["Johor","Sabah","Sarawak","Pahang"],

c:2

},

{

q:"Apakah hasil 100 ÷ 4?",

a:["20","25","30","40"],

c:1

},

{

q:"Haiwan yang dikenali sebagai Raja Rimba ialah?",

a:["Harimau","Singa","Gajah","Beruang"],

c:1

}

];

let current = 0;

function loadQuestion(){

let q = questions[current];

let html = "<h3>"+q.q+"</h3>";

for(let i=0;i<q.a.length;i++){

html += `<button class="answer" onclick="checkAnswer(${i})">${q.a[i]}</button>`;

}

document.getElementById("quiz").innerHTML = html;

}

function checkAnswer(i){

if(i===questions[current].c){

alert("✅ Betul! Hebat Amna!");

}else{

alert("❌ Belum tepat. Cuba lagi!");

}

}

function nextQuestion(){

current++;

if(current>=questions.length){

current=0;

alert("🎉 Tahniah Amna! Semua soalan selesai. Pusingan baru bermula.");

}

loadQuestion();

}

loadQuestion();

</script>

</body>

</html>
