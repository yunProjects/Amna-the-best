
<!DOCTYPE html>

<html lang="ms">

<head>

<meta charset="UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Amna Study Hub</title>

<style>

body{

    font-family:Arial,sans-serif;

    background:#e9ddf5;

    text-align:center;

    padding:20px;

}

.card{

    background:white;

    max-width:700px;

    margin:auto;

    padding:20px;

    border-radius:15px;

    box-shadow:0 0 10px rgba(0,0,0,0.1);

}

button{

    display:block;

    width:100%;

    margin:10px 0;

    padding:12px;

    border:none;

    border-radius:10px;

    background:#8e6ccf;

    color:white;

    font-size:16px;

}

button:hover{

    opacity:0.9;

}

</style>

</head>

<body>

<div class="card">

<h1>🌸 Amna Study Hub 🌸</h1>

<p>Belajar sikit setiap hari, kejayaan pasti datang.</p>

<h2 id="question"></h2>

<div id="answers"></div>

</div>

<script>

const questions = [

{

question:"Apakah hasil 7 × 8 ?",

answers:["54","56","64","48"],

correct:1

},

{

question:"Planet yang kita duduki ialah?",

answers:["Marikh","Bumi","Musytari","Zuhrah"],

correct:1

},

{

question:"Siapakah Perdana Menteri pertama Malaysia?",

answers:["Tun Mahathir","Tunku Abdul Rahman","Tun Razak","Tun Hussein Onn"],

correct:1

},

{

question:"Air membeku pada suhu berapa?",

answers:["0°C","50°C","100°C","10°C"],

correct:0

},

{

question:"Apakah ibu negara Malaysia?",

answers:["Johor Bahru","Kuching","Kuala Lumpur","Ipoh"],

correct:2

},

{

question:"9 × 9 = ?",

answers:["72","81","99","90"],

correct:1

},

{

question:"Haiwan manakah mamalia?",

answers:["Ikan","Katak","Kucing","Ayam"],

correct:2

},

{

question:"Apakah warna yang terhasil daripada merah + kuning?",

answers:["Hijau","Jingga","Ungu","Biru"],

correct:1

},

{

question:"Berapa bilangan benua di dunia?",

answers:["5","6","7","8"],

correct:2

},

{

question:"Bahasa kebangsaan Malaysia ialah?",

answers:["Inggeris","Tamil","Melayu","Mandarin"],

correct:2

}

];

let currentQuestion = 0;

let score = 0;

function showQuestion(){

const q = questions[currentQuestion];

document.getElementById("question").innerHTML = q.question;

document.getElementById("answers").innerHTML =

q.answers.map((answer,index)=>

`<button onclick="checkAnswer(${index})">${answer}</button>`

).join("");

}

function checkAnswer(index){

if(index === questions[currentQuestion].correct){

score++;

}

currentQuestion++;

if(currentQuestion < questions.length){

showQuestion();

}else{

document.querySelector(".card").innerHTML = `

<h1>🎉 Tahniah Amna 🎉</h1>

<h2>Skor: ${score}/${questions.length}</h2>

<button onclick="location.reload()">Main Lagi</button>

`;

}

}

showQuestion();

</script>

</body>

</html>
